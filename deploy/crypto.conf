upstream cryptoSignal {
    server 127.0.0.1:3003;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name crypto.eviadesk.com;


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name crypto.eviadesk.com;

    ssl_certificate /etc/letsencrypt/live/crypto.eviadesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crypto.eviadesk.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/crypto.eviadesk.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/cryptoSignal.access.log;
    error_log /var/log/nginx/cryptoSignal.error.log;

    client_max_body_size 10m;

    location / {
        proxy_pass http://cryptoSignal;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }
}
