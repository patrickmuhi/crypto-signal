server {
    listen 80;
    server_name signals.crypsey.com;

    # SSE requires buffering disabled — otherwise events are held until the
    # buffer fills and the client never receives them in real time
    proxy_buffering off;
    proxy_cache    off;

    # SSE connections are long-lived; default read timeout is 60s which will
    # silently drop the stream. Set high enough that only true dead connections close.
    proxy_read_timeout 24h;

    location / {
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type, Cache-Control';
            add_header Access-Control-Max-Age       86400;
            return 204;
        }

        proxy_pass http://localhost:5007;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Open to all origins
        add_header Access-Control-Allow-Origin  *  always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS'  always;
        add_header Access-Control-Allow-Headers 'Content-Type, Cache-Control'  always;

        # Tell any downstream nginx/proxy layers not to buffer either
        add_header X-Accel-Buffering no  always;
    }
}
